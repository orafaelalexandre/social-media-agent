<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Media Agent — Rafael Alexandre</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --mn: #00142F; --gelo: #F2F8F9; --azul: #424FFF; --oceano: #001893;
  --menta: #A7E6D7; --coral: #FF6B4D;
  --bg: #090E1A; --s1: #111827; --s2: #151e30; --s3: #1a2540;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --text: #E8EDF5; --muted: rgba(232,237,245,0.45); --muted2: rgba(232,237,245,0.25);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* HEADER */
.hdr{background:linear-gradient(135deg,#00142F 0%,#0a1a4a 100%);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr-l{display:flex;align-items:center;gap:12px}
.logo-mark{width:36px;height:36px;background:var(--azul);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#fff}
.hdr-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;color:var(--gelo)}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:8px}
.stats{display:flex;gap:5px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:3px 10px;font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px}
.dot{width:6px;height:6px;border-radius:50%}
.btn-hdr{background:rgba(66,79,255,.15);border:1px solid rgba(66,79,255,.3);color:var(--azul);padding:6px 13px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px}
.btn-hdr:hover{background:rgba(66,79,255,.25)}
.btn-hdr.spin svg{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* FILTROS */
.filters{background:var(--s1);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.flbl{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-right:2px}
.chip{padding:4px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.on{background:var(--azul);border-color:var(--azul);color:#fff}
.sep{width:1px;height:18px;background:var(--border)}

/* MAIN */
.main{padding:24px 28px 80px;max-width:860px;margin:0 auto}

/* ESTADO */
.state{text-align:center;padding:80px 20px;color:var(--muted)}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--azul);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
.state h3{font-family:'Syne',sans-serif;font-size:17px;color:var(--text);margin-bottom:6px}
.state p{font-size:13px;line-height:1.6;max-width:340px;margin:0 auto}

/* SEMANA */
.wk{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--azul);padding:24px 0 8px;border-bottom:1px solid var(--border);margin-bottom:10px}
.wk:first-child{padding-top:0}

/* CARD */
.card{background:var(--s1);border:1px solid var(--border);border-radius:11px;margin-bottom:7px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:rgba(66,79,255,.25)}
.card.open{border-color:rgba(66,79,255,.4)}
.card-hd{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;user-select:none}
.fmt{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:3px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.f-reels{background:rgba(255,107,77,.15);color:var(--coral)}
.f-carrossel{background:rgba(66,79,255,.15);color:#818cf8}
.f-foto{background:rgba(167,230,215,.15);color:var(--menta)}
.f-framework{background:rgba(245,166,35,.15);color:#f5a623}
.f-linkedin{background:rgba(0,119,181,.15);color:#60a5fa}
.f-enquete{background:rgba(167,230,215,.2);color:#a78bfa}
.f-default{background:rgba(255,255,255,.06);color:var(--muted)}
.cdate{font-size:12px;color:var(--muted);white-space:nowrap;flex-shrink:0;font-weight:500}
.ctema{flex:1;font-size:13px;font-weight:500;color:var(--text);line-height:1.35}
.sbadge{font-size:10px;font-weight:600;padding:3px 9px;border-radius:16px;white-space:nowrap;flex-shrink:0;cursor:pointer;transition:opacity .15s}
.sbadge:hover{opacity:.75}
.s-backlog{background:rgba(255,107,77,.1);color:var(--coral);border:1px solid rgba(255,107,77,.2)}
.s-prepared{background:rgba(167,230,215,.1);color:var(--menta);border:1px solid rgba(167,230,215,.2)}
.s-scheduled{background:rgba(66,79,255,.1);color:#818cf8;border:1px solid rgba(66,79,255,.25)}
.s-published{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.s-default{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.chev{color:var(--muted);font-size:11px;transition:transform .2s;flex-shrink:0}
.card.open .chev{transform:rotate(180deg)}

/* CARD BODY */
.card-body{display:none;border-top:1px solid var(--border)}
.card.open .card-body{display:block}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 16px;overflow-x:auto}
.tab{font-size:12px;font-weight:500;padding:9px 12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab.on{color:var(--azul);border-bottom-color:var(--azul)}
.pane{display:none;padding:16px}
.pane.on{display:block}

/* CONTEÚDO */
.content-text{font-size:13px;line-height:1.85;color:var(--text);white-space:pre-wrap;word-break:break-word}
.empty{font-size:13px;color:var(--muted);font-style:italic;padding:4px 0}
.tp-text{font-size:15px;line-height:2;color:var(--text);white-space:pre-wrap;word-break:break-word;font-family:'DM Sans',sans-serif;letter-spacing:.01em}

/* AÇÕES */
.actions{display:flex;gap:7px;flex-wrap:wrap;padding:11px 16px;border-top:1px solid var(--border);background:var(--s2)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;border:none}
.btn-copy{background:rgba(66,79,255,.12);color:#818cf8;border:1px solid rgba(66,79,255,.25)}
.btn-copy:hover{background:rgba(66,79,255,.22)}
.btn-copy.ok{background:rgba(34,197,94,.12);color:#4ade80;border-color:rgba(34,197,94,.25)}
.btn-dl{background:rgba(167,230,215,.1);color:var(--menta);border:1px solid rgba(167,230,215,.2)}
.btn-dl:hover{background:rgba(167,230,215,.18)}
.btn-dl.ok{background:rgba(34,197,94,.12);color:#4ade80;border-color:rgba(34,197,94,.25)}
.btn-dl.loading{opacity:.6;pointer-events:none}
.btn-ghost{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.08);color:var(--text)}

/* STATUS DROPDOWN */
.status-menu{position:relative;display:inline-block}
.status-dd{position:absolute;top:calc(100% + 6px);right:0;background:var(--s3);border:1px solid var(--border2);border-radius:9px;padding:5px;z-index:300;min-width:140px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.status-dd button{display:block;width:100%;text-align:left;padding:7px 11px;border:none;background:transparent;color:var(--text);font-size:12px;font-weight:500;cursor:pointer;border-radius:6px;font-family:'DM Sans',sans-serif;transition:background .1s}
.status-dd button:hover{background:rgba(255,255,255,.06)}

/* AGENDADO INPUT */
.sched-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid var(--border);background:var(--s2)}
.sched-row label{font-size:11px;color:var(--muted);font-weight:500;white-space:nowrap}
.sched-row input{background:var(--s3);border:1px solid var(--border2);color:var(--text);border-radius:7px;padding:5px 10px;font-size:12px;font-family:'DM Sans',sans-serif;flex:1}
.sched-row input:focus{outline:none;border-color:var(--azul)}
.sched-row .btn{flex-shrink:0}

/* CRIATIVO PREVIEW */
.criativo-wrap{display:flex;flex-direction:column;gap:12px}
.canvas-wrap{text-align:center}
canvas{border-radius:8px;max-width:100%;border:1px solid var(--border)}
.slides-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.slide-thumb{border-radius:6px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:border-color .15s}
.slide-thumb:hover{border-color:rgba(66,79,255,.4)}
.slide-thumb canvas{display:block;width:100%}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>

<header class="hdr">

    <div class="logo-mark">RA</div>
    <div>
      <div class="hdr-title">Social Media Agent</div>
      <div class="hdr-sub">@orafaelalexandre &middot; Abril 2026</div>
    </div>
  </div>

    <button class="btn-hdr" id="refreshBtn" onclick="loadData()">

  <button class="chip" data-fg="Post" onclick="setF('fmt','Post',this)">Post LinkedIn</button>
  <button class="chip" data-fg="Enquete" onclick="setF('fmt','Enquete',this)">Enquete</button>
  <div class="sep"></div>
  <span class="flbl">Status</span>

  <button class="chip" data-sg="Backlog" onclick="setF('status','Backlog',this)">Backlog</button>
  <button class="chip" data-sg="Prepared" onclick="setF('status','Prepared',this)">Prepared</button>
  <button class="chip" data-sg="Scheduled" onclick="setF('status','Scheduled',this)">Scheduled</button>
  <button class="chip" data-sg="Published" onclick="setF('status','Published',this)">Published</button>
</div>

<main class="main" id="main">
  <div class="state"><div class="spinner"></div><h3>Carregando...</h3><p>Buscando dados da planilha</p></div>
</main>

let ALL = [];
let filters = {fmt:'all', status:'all'};
let openCard = null;
let openMenuCard = null;

// ── IMAGES ──
const imgB = new Image(); imgB.src = LOGO_B;
const imgD = new Image(); imgD.src = LOGO_D;

// ── COLORS ──
const C = {
  mn:'#00142F', gelo:'#F2F8F9', azul:'#424FFF', oceano:'#001893',
  menta:'#A7E6D7', coral:'#FF6B4D'
};

// ── LOAD ──
async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spin');
  document.getElementById('main').innerHTML = '<div class="state"><div class="spinner"></div><h3>Carregando...</h3><p>Buscando dados da planilha</p></div>';
  try {
    const r = await fetch(SCRIPT + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    ALL = d.posts || [];
    render();
  } catch(e) {
    document.getElementById('main').innerHTML = `<div class="state"><h3>Erro ao carregar</h3><p>${e.message}<br><br><small>Verifique se o Apps Script está publicado corretamente.</small></p></div>`;
  }
  btn.classList.remove('spin');
}

// ── FILTERS ──
function setF(type, val, el) {
  filters[type] = val;
  document.querySelectorAll(type === 'fmt' ? '[data-fg]' : '[data-sg]').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  render();
}

function matches(p) {
  const fok = filters.fmt === 'all' || p.formato.toLowerCase().includes(filters.fmt.toLowerCase());
  const sok = filters.status === 'all' || p.status.toLowerCase().includes(filters.status.toLowerCase());
  return fok && sok;
}

// ── RENDER ──
function render() {
  const list = ALL.filter(matches);
  updateStats();
  if (!list.length) { document.getElementById('main').innerHTML = '<div class="state"><p>Nenhum post com esses filtros.</p></div>'; return; }
  
  const bySemana = {};
  list.forEach(p => { const k = p.semana || 'Sem semana'; if (!bySemana[k]) bySemana[k] = []; bySemana[k].push(p); });
  
  let h = '';
  for (const [semana, posts] of Object.entries(bySemana)) {
    h += `<div class="wk">${semana}</div>`;
    posts.forEach(p => { h += cardHtml(p); });
  }
  document.getElementById('main').innerHTML = h;
}

function updateStats() {
  const counts = {Backlog:0, Prepared:0, Scheduled:0, Published:0};
  ALL.forEach(p => {
    const s = p.status;
    if (s.includes('Backlog')) counts.Backlog++;
    else if (s.includes('Prepared')) counts.Prepared++;
    else if (s.includes('Scheduled')) counts.Scheduled++;
    else if (s.includes('Published')) counts.Published++;
  });
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="dot" style="background:#555"></div>${ALL.length}</div>
    <div class="stat"><div class="dot" style="background:var(--coral)"></div>${counts.Backlog}</div>
    <div class="stat"><div class="dot" style="background:var(--menta)"></div>${counts.Prepared}</div>
    <div class="stat"><div class="dot" style="background:#818cf8"></div>${counts.Scheduled}</div>
    ${counts.Published > 0 ? `<div class="stat"><div class="dot" style="background:#4ade80"></div>${counts.Published}</div>` : ''}
  `;
}

function fmtCls(f) {
  const l = f.toLowerCase();
  if (l.includes('reels')) return 'f-reels';
  if (l.includes('carrossel')) return 'f-carrossel';
  if (l.includes('foto') || l.includes('dump')) return 'f-foto';
  if (l.includes('framework')) return 'f-framework';
  if (l.includes('post') || l.includes('linkedin')) return 'f-linkedin';
  if (l.includes('enquete')) return 'f-enquete';
  return 'f-default';
}

function sCls(s) {
  const l = s.toLowerCase();
  if (l.includes('backlog')) return 's-backlog';
  if (l.includes('prepared')) return 's-prepared';
  if (l.includes('scheduled')) return 's-scheduled';
  if (l.includes('published')) return 's-published';
  return 's-default';
}

function fmtLabel(f) {
  return f || '—';
}

function hasCreativo(p) {
  const l = p.formato.toLowerCase();
  return l.includes('carrossel') || l.includes('framework') || l.includes('reels');
}

function isReels(p) { return p.formato.toLowerCase().includes('reels'); }
function isCarrossel(p) { return p.formato.toLowerCase().includes('carrossel'); }
function isFramework(p) { return p.formato.toLowerCase().includes('framework'); }

function cardHtml(p) {
  const id = 'c' + p.row;
  const hasLeg = p.legenda.trim();
  const hasRot = p.roteiro.trim();
  const hasFrm = p.frame.trim();
  const hasCar = p.carrossel.trim();
  const hasCriat = hasCreativo(p);
  const showRot = isReels(p);

  // Tabs a mostrar
  let tabs = '';
  let panes = '';

  // Legenda
  tabs += `<div class="tab on" onclick="switchTab('${id}','leg',this)">Legenda</div>`;
  panes += `<div class="pane on" id="${id}-leg">
    ${hasLeg ? `<div class="content-text">${esc(p.legenda)}</div>` : '<div class="empty">Legenda não preenchida ainda.</div>'}
  </div>`;

  // Roteiro (só Reels)
  if (showRot) {
    tabs += `<div class="tab" onclick="switchTab('${id}','rot',this)">Roteiro</div>`;
    panes += `<div class="pane" id="${id}-rot">
      ${hasRot ? `<div class="tp-text">${esc(p.roteiro)}</div>` : '<div class="empty">Roteiro não preenchido ainda.</div>'}
    </div>`;
  }

  // Criativo
  if (hasCriat) {
    tabs += `<div class="tab" onclick="switchTab('${id}','criat',this)">Criativo</div>`;
    panes += `<div class="pane" id="${id}-criat"><div id="${id}-criat-content"><div class="empty">Clique para gerar o criativo.</div></div></div>`;
  }

  // Botões de ação
  let actLeg = hasLeg ? `<button class="btn btn-copy" id="bl-${id}" onclick="copyTxt('bl-${id}','${id}','leg')">📋 Copiar legenda</button>` : '';
  let actRot = (showRot && hasRot) ? `<button class="btn btn-copy" id="br-${id}" onclick="copyTxt('br-${id}','${id}','rot')">📋 Copiar roteiro</button>` : '';
  let actCriat = hasCriat ? `<button class="btn btn-dl" onclick="genCreativo('${id}',JSON.parse(this.dataset.p))" data-p='${JSON.stringify(p).replace(/'/g,"&#39;")}'>🎨 Gerar criativo</button>` : '';

  // Agendado row
  const schedRow = `<div class="sched-row" id="sched-${id}">
    <label>📅 Agendado para</label>
    <input type="datetime-local" id="dt-${id}" value="${p.agendado || ''}" placeholder="dd/mm/aaaa hh:mm">
    <button class="btn btn-ghost" onclick="saveField(${p.row},'agendado',document.getElementById('dt-${id}').value,'${id}')">Salvar</button>
  </div>`;

  return `<div class="card" id="${id}">
    <div class="card-hd" onclick="toggleCard('${id}')">
      <span class="fmt ${fmtCls(p.formato)}">${fmtLabel(p.formato)}</span>
      <span class="cdate">${esc(p.data)}</span>
      <span class="ctema">${esc(p.tema)}</span>
      <div class="status-menu">
        <span class="sbadge ${sCls(p.status)}" onclick="toggleMenu(event,'${id}')">${p.status || '—'} ▾</span>
        <div class="status-dd" id="menu-${id}" style="display:none">
          ${['Backlog','Prepared','Scheduled','Published'].map(s =>
            `<button onclick="updateStatus(event,'${id}',${p.row},'${s}')">${s}</button>`
          ).join('')}
        </div>
      </div>
      <span class="chev">▾</span>
    </div>
    <div class="card-body">
      <div class="tabs">${tabs}</div>
      ${panes}
      <div class="actions">${actLeg}${actRot}${actCriat}<button class="btn btn-ghost" onclick="window.open(SHEETS,'_blank')">↗ Planilha</button></div>
      ${schedRow}
    </div>
  </div>`;
}

// ── TOGGLE ──
function toggleCard(id) {
  const card = document.getElementById(id);
  const isOpen = card.classList.contains('open');
  if (openCard && openCard !== id) document.getElementById(openCard)?.classList.remove('open');
  card.classList.toggle('open', !isOpen);
  openCard = isOpen ? null : id;
  closeAllMenus();
}

function toggleMenu(e, id) {
  e.stopPropagation();
  const menu = document.getElementById('menu-' + id);
  const isOpen = menu.style.display !== 'none';
  closeAllMenus();
  if (!isOpen) { menu.style.display = 'block'; openMenuCard = id; }
}

function closeAllMenus() {
  if (openMenuCard) { const m = document.getElementById('menu-' + openMenuCard); if (m) m.style.display = 'none'; openMenuCard = null; }
}
document.addEventListener('click', closeAllMenus);

function switchTab(cardId, tab, el) {
  const card = document.getElementById(cardId);
  card.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  card.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  document.getElementById(cardId + '-' + tab)?.classList.add('on');
}

// ── COPY ──
async function copyTxt(btnId, cardId, tab) {
  const pane = document.getElementById(cardId + '-' + tab);
  if (!pane) return;
  const text = pane.querySelector('.content-text, .tp-text')?.innerText || '';
  if (!text) return;
  const btn = document.getElementById(btnId);
  try { await navigator.clipboard.writeText(text); } 
  catch { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
  const orig = btn.innerHTML; btn.innerHTML = '✓ Copiado!'; btn.classList.add('ok');
  setTimeout(() => { btn.innerHTML = orig; btn.classList.remove('ok'); }, 2000);
}

// ── STATUS UPDATE ──
async function updateStatus(e, cardId, row, status) {
  e.stopPropagation();
  closeAllMenus();
  const badge = document.querySelector('#' + cardId + ' .sbadge');
  if (badge) { badge.textContent = status + ' ▾'; badge.className = 'sbadge ' + sCls(status); }
  await saveField(row, 'status', status, cardId);
  ALL.find(p => p.row === row && (p.status = status));
  updateStats();
}

async function saveField(row, field, value, cardId) {
  try {
    await fetch(SCRIPT, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateField', row, field, value }),
    });
  } catch(e) {
    console.warn('Save failed:', e);
  }
}

// ── ESC ──
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── CRIATIVO ──
const THEMES = [
  {bg:C.mn, fg:C.gelo, acc:C.menta, logo:'B'},
  {bg:C.azul, fg:C.gelo, acc:'rgba(255,255,255,.3)', logo:'B'},
  {bg:C.gelo, fg:C.mn, acc:C.azul, logo:'D'},
];

function genCreativo(cardId, post) {
  const container = document.getElementById(cardId + '-criat-content');
  if (!container) return;
  const fmt = post.formato.toLowerCase();
  
  if (fmt.includes('carrossel') || fmt.includes('framework')) {
    genSlides(container, post);
  } else if (fmt.includes('reels')) {
    genFrame(container, post);
  }
}

function genFrame(container, post) {
  const sz = 400;
  const c = document.createElement('canvas'); c.width = sz; c.height = sz;
  const ctx = c.getContext('2d');
  const th = THEMES[0];
  
  ctx.fillStyle = th.bg; ctx.fillRect(0,0,sz,sz);
  
  // Accent bar
  ctx.fillStyle = th.acc; ctx.fillRect(0, sz*0.85, sz, 4);
  
  // Logo
  if (imgB.complete && imgB.naturalWidth > 0) {
    const lh = sz*0.04; const lw = lh * (imgB.naturalWidth/imgB.naturalHeight);
    ctx.drawImage(imgB, sz*0.06, sz*0.06, lw, lh);
  }
  
  // Formato badge
  ctx.fillStyle = th.acc;
  roundRect(ctx, sz*0.06, sz*0.14, sz*0.22, sz*0.05, sz*0.012);
  ctx.fillStyle = th.bg; ctx.font = `700 ${sz*0.022}px sans-serif`; ctx.textAlign = 'center';
  ctx.fillText(post.formato.toUpperCase(), sz*0.17, sz*0.172);
  
  // Title
  ctx.fillStyle = th.fg; ctx.textAlign = 'left';
  ctx.font = `800 ${sz*0.052}px sans-serif`;
  wrapText(ctx, post.tema, sz*0.06, sz*0.28, sz*0.88, sz*0.065);
  
  // Handle
  ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = `400 ${sz*0.024}px sans-serif`;
  ctx.fillText('@orafaelalexandre', sz*0.06, sz*0.92);
  
  const wrap = document.createElement('div'); wrap.className = 'criativo-wrap';
  const cw = document.createElement('div'); cw.className = 'canvas-wrap'; cw.appendChild(c);
  wrap.appendChild(cw);
  
  const actions = document.createElement('div'); actions.className = 'actions';
  const dlBtn = makeBtn('⬇ Baixar Frame PNG', 'btn-dl', () => dlCanvas(c, 'frame-'+post.data+'.png', dlBtn));
  const dlPdfBtn = makeBtn('⬇ PDF LinkedIn', 'btn-dl', () => dlCanvasPDF(c, 'frame-'+post.data+'.pdf', dlPdfBtn));
  actions.appendChild(dlBtn); actions.appendChild(dlPdfBtn);
  wrap.appendChild(actions);
  container.innerHTML = ''; container.appendChild(wrap);
}

function genSlides(container, post) {
  const content = post.carrossel || post.frame || post.tema;
  const lines = content.split('\n').filter(l => l.trim());
  
  // Parse slides: linhas que começam com número ou são títulos curtos
  const slides = [];
  let current = null;
  lines.forEach(line => {
    const m = line.match(/^(\d+[\.\)\-]|Slide \d+|##)/i);
    if (m || (line.length < 60 && line === line.toUpperCase() && line.trim())) {
      if (current) slides.push(current);
      current = {title: line.replace(/^\d+[\.\)\-]\s*/, '').replace(/^Slide \d+[:\-]\s*/i,'').replace(/^##\s*/,''), body: ''};
    } else if (current) {
      current.body += (current.body ? '\n' : '') + line;
    } else {
      slides.push({title: line, body: ''});
    }
  });
  if (current) slides.push(current);
  
  if (slides.length === 0) slides.push({title: post.tema, body: content});
  
  const sz = 380;
  const canvases = slides.map((slide, i) => {
    const th = THEMES[i % THEMES.length];
    const c = document.createElement('canvas'); c.width = sz; c.height = sz;
    const ctx = c.getContext('2d');
    drawSlide(ctx, sz, slide, i, slides.length, th);
    return c;
  });
  
  const wrap = document.createElement('div'); wrap.className = 'criativo-wrap';
  const grid = document.createElement('div'); grid.className = 'slides-grid';
  canvases.forEach(c => {
    const thumb = document.createElement('div'); thumb.className = 'slide-thumb';
    thumb.appendChild(c); grid.appendChild(thumb);
  });
  wrap.appendChild(grid);
  
  const actions = document.createElement('div'); actions.className = 'actions';
  canvases.forEach((c, i) => {
    const b = makeBtn(`⬇ Slide ${i+1} PNG`, 'btn-dl', () => dlCanvas(c, `slide-${i+1}.png`, b));
    actions.appendChild(b);
  });
  const pdfBtn = makeBtn('⬇ PDF LinkedIn', 'btn-dl', () => dlSlidesPDF(canvases, 'carrossel-'+post.data+'.pdf', pdfBtn));
  actions.appendChild(pdfBtn);
  wrap.appendChild(actions);
  container.innerHTML = ''; container.appendChild(wrap);
}

function drawSlide(ctx, sz, slide, idx, total, th) {
  ctx.fillStyle = th.bg; ctx.fillRect(0,0,sz,sz);
  
  // Logo
  const li = th.logo === 'B' ? imgB : imgD;
  if (li.complete && li.naturalWidth > 0) {
    const lh = sz*0.04; const lw = lh*(li.naturalWidth/li.naturalHeight);
    ctx.drawImage(li, sz*0.07, sz*0.07, lw, lh);
  }
  
  // Número do slide
  ctx.fillStyle = th.acc; ctx.font = `700 ${sz*0.028}px sans-serif`; ctx.textAlign = 'right';
  ctx.fillText(`${idx+1}/${total}`, sz*0.93, sz*0.1);
  
  // Acento
  ctx.fillStyle = th.acc; ctx.fillRect(sz*0.07, sz*0.22, sz*0.07, sz*0.006);
  
  // Título
  ctx.fillStyle = th.fg; ctx.textAlign = 'left';
  ctx.font = `800 ${sz*0.06}px sans-serif`;
  const ty = wrapText(ctx, slide.title, sz*0.07, sz*0.32, sz*0.86, sz*0.072) + sz*0.04;
  
  // Corpo
  if (slide.body) {
    ctx.fillStyle = th.fg; ctx.globalAlpha = 0.75;
    ctx.font = `400 ${sz*0.036}px sans-serif`;
    wrapText(ctx, slide.body, sz*0.07, ty, sz*0.86, sz*0.046);
    ctx.globalAlpha = 1;
  }
  
  // Footer
  ctx.fillStyle = th.acc; ctx.fillRect(0, sz*0.88, sz, 2);
  ctx.fillStyle = th.fg; ctx.globalAlpha = 0.4;
  ctx.font = `400 ${sz*0.026}px sans-serif`; ctx.textAlign = 'left';
  ctx.fillText('@orafaelalexandre', sz*0.07, sz*0.95);
  ctx.globalAlpha = 1;
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  if (!text) return y;
  const words = String(text).split(' '); let line = ''; let cy = y;
  for (let i = 0; i < words.length; i++) {
    const t = line + words[i] + ' ';
    if (ctx.measureText(t).width > maxW && i > 0) {
      ctx.fillText(line.trim(), x, cy); line = words[i] + ' '; cy += lineH;
    } else line = t;
  }
  ctx.fillText(line.trim(), x, cy); return cy + lineH;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); ctx.fill();
}

function makeBtn(label, cls, fn) {
  const b = document.createElement('button'); b.className = 'btn ' + cls;
  b.innerHTML = label; b.onclick = fn; return b;
}

function dlCanvas(canvas, filename, btn) {
  if (btn) { btn.classList.add('loading'); btn.innerHTML = '⏳ Gerando...'; }
  const url = canvas.toDataURL('image/png');
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  if (btn) { btn.classList.remove('loading'); btn.innerHTML = '✓ Baixado!'; btn.classList.add('ok'); setTimeout(() => { btn.innerHTML = '⬇ ' + filename.split('.')[0]; btn.classList.remove('ok'); }, 2500); }
}

function dlCanvasPDF(canvas, filename, btn) {
  if (btn) { btn.classList.add('loading'); btn.innerHTML = '⏳ Gerando PDF...'; }
  // Simple PDF with canvas embedded as image
  const url = canvas.toDataURL('image/jpeg', 0.92);
  // Create a minimal PDF using jsPDF approach via data URI
  const w = window.open('', '_blank');
  if (w) {
    w.document.write(`<html><head><title>${filename}</title><style>body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#111}img{max-width:100%;border-radius:8px}</style></head><body><img src="${url}"><script>setTimeout(()=>window.print(),500)<\/script></body></html>`);
    w.document.close();
  }
  if (btn) { btn.classList.remove('loading'); btn.innerHTML = '✓ PDF aberto!'; btn.classList.add('ok'); setTimeout(() => { btn.innerHTML = '⬇ PDF LinkedIn'; btn.classList.remove('ok'); }, 3000); }
}

function dlSlidesPDF(canvases, filename, btn) {
  if (btn) { btn.classList.add('loading'); btn.innerHTML = '⏳ Gerando PDF...'; }
  const imgs = canvases.map(c => c.toDataURL('image/jpeg', 0.92));
  const w = window.open('', '_blank');
  if (w) {
    const slides = imgs.map(src => `<div style="page-break-after:always;margin:0;padding:0"><img src="${src}" style="width:100%;display:block"></div>`).join('');
    w.document.write(`<html><head><title>${filename}</title><style>@media print{body{margin:0}}body{margin:0;background:#111}img{width:100%;display:block}</style></head><body>${slides}<script>setTimeout(()=>window.print(),600)<\/script></body></html>`);
    w.document.close();
  }
  if (btn) { btn.classList.remove('loading'); btn.innerHTML = '✓ PDF aberto!'; btn.classList.add('ok'); setTimeout(() => { btn.innerHTML = '⬇ PDF LinkedIn'; btn.classList.remove('ok'); }, 3000); }
}
